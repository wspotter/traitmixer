<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personality Console</title>
  <meta
    name="description"
    content="Local interface for configuring agent personality overlays."
  />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root, html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #090b10;
      --bg-top: #170e13;
      --text: #efe7d9;
      --panel-bg: rgba(16, 18, 24, 0.86);
      --panel-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(0, 0, 0, 0.25);
      --input-border: rgba(255, 255, 255, 0.04);
      --input-text: #efe7d9;
      --btn-active-bg: rgba(255, 138, 61, 0.2);
      --btn-active-text: #ffddc1;
      --btn-hover-bg: rgba(255, 255, 255, 0.06);
      --btn-hover-text: #efe7d9;
      --btn-text: rgba(239, 231, 217, 0.5);
      --bg-gradient-top: rgba(255, 112, 77, 0.16);
      --bg-gradient-topright: rgba(84, 214, 255, 0.12);
      --theme-sel-border: rgba(255, 255, 255, 0.1);
    }
    
    html[data-theme="light"] {
      color-scheme: light;
      --bg: #f9f9f9;
      --bg-top: #ececec;
      --text: #1f1f1f;
      --panel-bg: rgba(255, 255, 255, 0.86);
      --panel-border: rgba(0, 0, 0, 0.1);
      --input-bg: rgba(0, 0, 0, 0.05);
      --input-border: rgba(0, 0, 0, 0.1);
      --input-text: #1f1f1f;
      --btn-active-bg: rgba(255, 138, 61, 0.25);
      --btn-active-text: #d95e00;
      --btn-hover-bg: rgba(0, 0, 0, 0.06);
      --btn-hover-text: #1f1f1f;
      --btn-text: rgba(0, 0, 0, 0.5);
      --bg-gradient-top: rgba(255, 112, 77, 0.1);
      --bg-gradient-topright: rgba(84, 214, 255, 0.1);
      --theme-sel-border: rgba(0, 0, 0, 0.1);
    }

    html[data-theme="neutral"] {
      color-scheme: dark;
      --bg: #1e1e1e;
      --bg-top: #252526;
      --text: #d4d4d4;
      --panel-bg: rgba(30, 30, 30, 0.86);
      --panel-border: rgba(255, 255, 255, 0.05);
      --input-bg: rgba(0, 0, 0, 0.2);
      --input-border: rgba(255, 255, 255, 0.05);
      --input-text: #d4d4d4;
      --btn-active-bg: rgba(0, 122, 204, 0.3);
      --btn-active-text: #9cdcfe;
      --btn-hover-bg: rgba(255, 255, 255, 0.05);
      --btn-hover-text: #d4d4d4;
      --btn-text: rgba(212, 212, 212, 0.5);
      --bg-gradient-top: rgba(50, 50, 50, 0.3);
      --bg-gradient-topright: rgba(80, 80, 80, 0.2);
      --theme-sel-border: rgba(255, 255, 255, 0.1);
    }

    @media (prefers-color-scheme: light) {
      html[data-theme="system"] {
        color-scheme: light;
        --bg: #f9f9f9;
        --bg-top: #ececec;
        --text: #1f1f1f;
        --panel-bg: rgba(255, 255, 255, 0.86);
        --panel-border: rgba(0, 0, 0, 0.1);
        --input-bg: rgba(0, 0, 0, 0.05);
        --input-border: rgba(0, 0, 0, 0.1);
        --input-text: #1f1f1f;
        --btn-active-bg: rgba(255, 138, 61, 0.25);
        --btn-active-text: #d95e00;
        --btn-hover-bg: rgba(0, 0, 0, 0.06);
        --btn-hover-text: #1f1f1f;
        --btn-text: rgba(0, 0, 0, 0.5);
        --bg-gradient-top: rgba(255, 112, 77, 0.1);
        --bg-gradient-topright: rgba(84, 214, 255, 0.1);
        --theme-sel-border: rgba(0, 0, 0, 0.1);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, var(--bg-gradient-top), transparent 24%),
        radial-gradient(circle at top right, var(--bg-gradient-topright), transparent 18%),
        linear-gradient(180deg, var(--bg-top), var(--bg) 28%);
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      -webkit-mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.22), transparent 85%);
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.22), transparent 85%);
      pointer-events: none;
      opacity: 0.28;
    }

    h1, h2, h3, strong {
      font-family: "Space Grotesk", sans-serif;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

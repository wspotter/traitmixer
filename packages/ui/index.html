<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraitMixer — Personality Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e1117;
      --surface: #161b22;
      --surface-hover: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --radius: 8px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    #app { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card-title { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .card-sub { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

    /* Row */
    .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* Callout */
    .callout { padding: 12px 16px; border-radius: var(--radius); font-size: 0.82rem; line-height: 1.5; }
    .callout.info { background: var(--accent-glow); border: 1px solid rgba(88,166,255,0.25); color: var(--accent); }

    /* Buttons */
    .btn {
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface-hover);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn:hover:not(:disabled) { background: var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); }
    .btn.primary:hover:not(:disabled) { filter: brightness(1.1); }
    .btn--sm { font-size: 0.75rem; padding: 4px 10px; }
    .btn--ghost { background: transparent; border-color: transparent; }
    .btn--ghost:hover:not(:disabled) { background: var(--surface-hover); }

    /* Agent pill */
    .agent-pill {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 99px;
      background: var(--surface-hover);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* Fields */
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field span { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .field select, .field input {
      font-family: var(--font);
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .field select:focus, .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }

    /* Code block */
    .code-block {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text-muted);
    }

    /* Personality Lab layout */
    .personality-lab__header { justify-content: space-between; }
    .personality-lab__actions { gap: 8px; }
    .personality-lab__context { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .personality-lab__pickers { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 16px; }
    .personality-lab__profile-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    /* Summary cards */
    .personality-lab__summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-top: 20px; }
    .personality-lab__summary-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .personality-lab__summary-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 4px; }
    .personality-lab__summary-value { font-size: 0.95rem; font-weight: 600; }
    .personality-lab__summary-copy { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }

    /* Metrics */
    .personality-lab__metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .personality-lab__metric-top { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 4px; }
    .personality-lab__meter { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
    .personality-lab__meter-fill { display: block; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #79c0ff); transition: width 0.3s ease; }
    .personality-lab__metric-detail { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }

    /* Scenes */
    .personality-lab__scene-strip { margin-top: 24px; }
    .personality-lab__scene-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; margin-top: 12px; }
    .personality-lab__scene {
      display: flex; flex-direction: column; gap: 6px;
      text-align: left;
      padding: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font);
      color: var(--text);
    }
    .personality-lab__scene:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-glow); }
    .personality-lab__scene:disabled { opacity: 0.4; cursor: not-allowed; }
    .personality-lab__scene-eyebrow { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); }
    .personality-lab__scene-title { font-size: 0.95rem; font-weight: 600; }
    .personality-lab__scene-copy { font-size: 0.78rem; color: var(--text-muted); }
    .personality-lab__scene-action { font-size: 0.72rem; color: var(--accent); font-weight: 500; margin-top: 4px; }

    /* Groups / grid */
    .personality-lab__group-title { font-size: 0.9rem; font-weight: 600; }
    .personality-lab__group-copy { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
    .personality-lab__grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-top: 20px; }
    .personality-lab__grid--quad { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .personality-lab__group { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .personality-lab__field { gap: 4px; }
    .personality-lab__hint { font-size: 0.68rem; color: var(--text-muted); }

    /* Preview */
    .personality-lab__preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-top: 20px; }
    .personality-lab__preview-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .personality-lab__preview { margin-top: 10px; }
    .personality-lab__overlay-compare-copy { margin-top: 12px; }

    /* Board snapshot */
    .personality-lab__board-snapshot { margin-top: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .personality-lab__board-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .personality-lab__board-name { font-size: 1rem; font-weight: 600; color: var(--accent); }
    .personality-lab__board-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .personality-lab__board-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .personality-lab__board-summary { display: flex; flex-direction: column; gap: 6px; }
    .personality-lab__delta-list { display: flex; flex-direction: column; gap: 4px; }
    .personality-lab__delta-item { display: flex; justify-content: space-between; font-size: 0.78rem; }
    .personality-lab__delta-label { font-weight: 500; }
    .personality-lab__delta-values { color: var(--text-muted); }
    .personality-lab__delta-empty { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

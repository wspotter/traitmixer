<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraitMixer — Persona Mixing Made Easy</title>
  <meta
    name="description"
    content="TraitMixer is a personality mixer for AI agents: tune tone, directness, humor, empathy, and channel-specific delivery, then push the compiled overlay into your stack."
  />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --bg-top: #170e13;
      --text: #efe7d9;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 112, 77, 0.16), transparent 24%),
        radial-gradient(circle at top right, rgba(84, 214, 255, 0.12), transparent 18%),
        linear-gradient(180deg, var(--bg-top), var(--bg) 28%);
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.22), transparent 85%);
      pointer-events: none;
      opacity: 0.28;
    }

    h1, h2, h3, strong {
      font-family: "Space Grotesk", sans-serif;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
